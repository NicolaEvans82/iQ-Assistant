<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourth iQ Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#002747;--deep:#0C4A7D;--teal:#00B69F;--orange:#FAA51A;--red:#D81632;--purple:#9678B6;
  --bg:#F5F5F5;--tbg:rgba(0,182,159,0.08);--tbdr:rgba(0,182,159,0.3);
  --rbg:rgba(216,22,50,0.08);--obg:rgba(250,165,26,0.1);--pbg:rgba(150,120,182,0.1);
}
body{font-family:'Roboto',sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;font-size:14px;color:#1a2533;overflow:hidden}
.topbar{background:var(--navy);color:#fff;padding:0 16px;display:flex;align-items:center;gap:10px;height:48px;flex-shrink:0}
.logo{font-weight:700;font-size:15px;letter-spacing:-0.02em;display:flex;align-items:center;gap:7px}
.logo .badge{background:var(--teal);font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:0.06em}
.loc{font-size:12px;opacity:0.5;margin-left:2px}
.demo{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:700;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);margin-left:auto}
.chat{flex:1;display:flex;flex-direction:column;max-width:820px;width:100%;margin:0 auto;padding:0 16px;min-height:0}
.msgs{flex:1;overflow-y:auto;padding:16px 0 8px;display:flex;flex-direction:column;gap:12px}

/* user bubble */
.mu{align-self:flex-end;background:var(--navy);color:#fff;border-radius:10px 10px 2px 10px;padding:10px 14px;font-size:13px;line-height:1.5;max-width:70%}

/* ai card wrapper */
.ma{align-self:flex-start;width:100%;max-width:560px}
.ma-summary{font-size:13px;line-height:1.55;color:#1a2533;margin-bottom:8px;padding:0 2px}
.ma-summary b{color:var(--deep)}

/* card */
.iq-card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:10px;overflow:hidden}
.iq-card-header{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between}
.iq-card-title{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#8a96a3}
.src-tag{font-size:10px;color:#b0b8c4;font-weight:500}

/* metric row */
.metric-row{display:flex;border-bottom:1px solid rgba(0,0,0,0.05)}
.metric-row:last-child{border-bottom:none}
.metric-cell{flex:1;padding:12px 14px;text-align:center;border-right:1px solid rgba(0,0,0,0.05)}
.metric-cell:last-child{border-right:none}
.metric-val{font-size:22px;font-weight:700;color:#1a2533;letter-spacing:-0.02em;line-height:1}
.metric-val.red{color:var(--red)}
.metric-val.orange{color:var(--orange)}
.metric-val.teal{color:var(--teal)}
.metric-lbl{font-size:11px;color:#8a96a3;margin-top:3px}

/* list rows */
.iq-list-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid rgba(0,0,0,0.05);gap:10px;font-size:12.5px}
.iq-list-row:last-child{border-bottom:none}
.row-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-red{background:var(--red)}
.dot-orange{background:var(--orange)}
.dot-teal{background:var(--teal)}
.dot-sky{background:#6FB4E3}
.dot-purple{background:var(--purple)}
.row-main{flex:1;font-weight:500}
.row-sub{font-size:11px;color:#8a96a3;margin-top:1px}
.row-right{font-size:12px;color:#8a96a3;text-align:right;flex-shrink:0}
.row-right b{color:#1a2533;font-weight:700}
.row-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:0.04em;flex-shrink:0}
.badge-red{background:var(--rbg);color:var(--red);border:1px solid rgba(216,22,50,0.2)}
.badge-orange{background:var(--obg);color:#a06500;border:1px solid rgba(250,165,26,0.25)}
.badge-teal{background:var(--tbg);color:#007a6a;border:1px solid var(--tbdr)}
.badge-purple{background:var(--pbg);color:var(--purple);border:1px solid rgba(150,120,182,0.25)}

/* tool call */
.mtool{align-self:flex-start;display:flex;align-items:center;gap:7px;padding:5px 10px;background:var(--tbg);border:1px solid var(--tbdr);border-radius:6px;font-size:11px;color:#007a6a;font-weight:500}
.spinner{width:10px;height:10px;border:2px solid #007a6a;border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
.tick{width:10px;height:10px;background:var(--teal);border-radius:50%;color:#fff;font-size:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* typing */
.typing{align-self:flex-start;padding:10px 14px;background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:10px}
.dots{display:flex;gap:4px;align-items:center}
.dots span{width:5px;height:5px;background:#ccc;border-radius:50%;animation:blink 1.2s infinite}
.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{transform:scale(0.8);opacity:0.4}40%{transform:scale(1.1);opacity:1}}

/* suggestions */
.suggs{padding:8px 0 6px;display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;padding:5px 11px;background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:14px;cursor:pointer;color:#445;transition:120ms;white-space:nowrap}
.chip:hover{border-color:var(--teal);color:var(--teal);background:var(--tbg)}

/* input */
.input-area{padding:10px 0 14px;flex-shrink:0}
.input-row{display:flex;gap:8px;background:#fff;border:1px solid rgba(0,0,0,0.12);border-radius:10px;padding:6px 6px 6px 14px;transition:120ms}
.input-row:focus-within{border-color:var(--teal);box-shadow:0 0 0 3px var(--tbg)}
.inp{flex:1;border:none;outline:none;font-size:13px;font-family:'Roboto',sans-serif;color:#1a2533;background:transparent;resize:none;line-height:1.5;max-height:100px}
.askbtn{background:var(--navy);color:#fff;border:none;border-radius:7px;padding:7px 16px;cursor:pointer;font-size:12px;font-weight:700;align-self:flex-end;transition:120ms;flex-shrink:0}
.askbtn:hover:not(:disabled){background:var(--deep)}
.askbtn:disabled{opacity:0.35;cursor:not-allowed}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span>fourth</span><span class="badge">iQ</span></div>
  <span class="loc">The Crown Hotel, Birmingham</span>
  <span class="demo">Demo</span>
</div>

<div class="chat">
  <div class="msgs" id="msgs"></div>
  <div class="suggs" id="suggs"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea class="inp" id="inp" rows="1" placeholder="Ask iQ anything..." onkeydown="handleKey(event)"></textarea>
      <button class="askbtn" id="askbtn" onclick="send()">Ask</button>
    </div>
  </div>
</div>

<script>
var thinking = false;

function card(title, src, metricsHtml, rowsHtml) {
  var h = '<div class="iq-card">';
  h += '<div class="iq-card-header"><span class="iq-card-title">' + title + '</span><span class="src-tag">' + src + '</span></div>';
  if (metricsHtml) h += '<div class="metric-row">' + metricsHtml + '</div>';
  if (rowsHtml) h += rowsHtml;
  h += '</div>';
  return h;
}
function metric(val, lbl, cls) {
  return '<div class="metric-cell"><div class="metric-val ' + (cls||'') + '">' + val + '</div><div class="metric-lbl">' + lbl + '</div></div>';
}
function row(dotCls, main, sub, right, badgeHtml) {
  var h = '<div class="iq-list-row">';
  h += '<span class="row-dot ' + dotCls + '"></span>';
  h += '<div style="flex:1"><div class="row-main">' + main + '</div>';
  if (sub) h += '<div class="row-sub">' + sub + '</div>';
  h += '</div>';
  if (right) h += '<div class="row-right">' + right + '</div>';
  if (badgeHtml) h += badgeHtml;
  h += '</div>';
  return h;
}

function getResponse(msg) {
  var text = msg.toLowerCase();
  for (var i = 0; i < RESPONSES.length; i++) {
    var r = RESPONSES[i];
    for (var j = 0; j < r.keys.length; j++) {
      if (text.indexOf(r.keys[j]) > -1) return r;
    }
  }
  return {
    tools: ['get_alerts -> IQ WFM API'],
    summary: 'I can help with shifts, labour, alerts, holidays, sales, payslips, rotas, P60, and right to work. Try one of the suggestions below.',
    cardTitle: null, cardSrc: null, metrics: null, rows: null
  };
}

function addUserMsg(text) {
  var c = document.getElementById('msgs');
  var m = document.createElement('div');
  m.className = 'mu'; m.textContent = text;
  c.appendChild(m); c.scrollTop = c.scrollHeight;
}

function addAIMsg(resp) {
  var c = document.getElementById('msgs');
  var wrap = document.createElement('div');
  wrap.className = 'ma';
  var sum = document.createElement('div');
  sum.className = 'ma-summary'; sum.innerHTML = resp.summary;
  wrap.appendChild(sum);
  if (resp.cardTitle) {
    var cardEl = document.createElement('div');
    cardEl.innerHTML = card(resp.cardTitle, resp.cardSrc, resp.metrics, resp.rows);
    wrap.appendChild(cardEl.firstChild);
  }
  c.appendChild(wrap); c.scrollTop = c.scrollHeight;
}

function addGreeting() {
  var c = document.getElementById('msgs');
  var wrap = document.createElement('div');
  wrap.className = 'ma';
  var sum = document.createElement('div');
  sum.className = 'ma-summary';
  sum.innerHTML = 'Good afternoon. I have access to shifts, labour data, alerts, holiday requests, sales performance, payslips, and right to work records across <b>13 Fourth API tools</b>.<br><br>What would you like to know?';
  wrap.appendChild(sum);
  c.appendChild(wrap);
}

function showTyping() {
  var c = document.getElementById('msgs');
  var t = document.createElement('div');
  t.className = 'typing'; t.id = 'typing';
  t.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  c.appendChild(t); c.scrollTop = c.scrollHeight;
}
function hideTyping() { var t = document.getElementById('typing'); if (t) t.remove(); }

function showTool(label, id) {
  var c = document.getElementById('msgs');
  var el = document.createElement('div');
  el.className = 'mtool'; el.id = 'tc' + id;
  var sp = document.createElement('span'); sp.className = 'spinner'; sp.id = 'sp' + id;
  var tx = document.createElement('span'); tx.textContent = label;
  el.appendChild(sp); el.appendChild(tx);
  c.appendChild(el); c.scrollTop = c.scrollHeight;
}
function doneTool(id) {
  var sp = document.getElementById('sp' + id);
  if (sp) {
    var t = document.createElement('span');
    t.className = 'tick'; t.textContent = 'v';
    sp.parentNode.replaceChild(t, sp);
  }
}

async function send(text) {
  if (thinking) return;
  var inp = document.getElementById('inp');
  var msg = text || inp.value.trim();
  if (!msg) return;
  inp.value = ''; inp.style.height = 'auto';
  thinking = true;
  document.getElementById('askbtn').disabled = true;
  addUserMsg(msg);
  showTyping();
  await new Promise(function(r) { setTimeout(r, 500); });
  hideTyping();
  var resp = getResponse(msg);
  for (var i = 0; i < resp.tools.length; i++) {
    showTool(resp.tools[i], i);
    await new Promise(function(r) { setTimeout(r, 380); });
    doneTool(i);
  }
  await new Promise(function(r) { setTimeout(r, 180); });
  addAIMsg(resp);
  thinking = false;
  document.getElementById('askbtn').disabled = false;
  document.getElementById('msgs').scrollTop = 99999;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  var t = e.target;
  t.style.height = 'auto';
  t.style.height = Math.min(t.scrollHeight, 100) + 'px';
}

var SUGGS = [
  "What alerts do I have today?",
  "Who can cover Jamie's sick shift?",
  "Should I approve the Saturday holiday requests?",
  "What is the Saturday labour forecast?",
  "What's driving the labour overage this week?",
  "Show me today's shifts",
  "Which staff have right to work expiring soon?",
  "How are sales performing today?",
  "What are this week's labour costs?",
  "How many holiday days do I have left?",
  "When is my next payslip and how much will I get?",
  "Show me my shifts next week",
  "Can I book Friday 30 May off?",
  "What do I need to do about my right to work?",
  "Show me my P60"
];

function init() {
  var c = document.getElementById('suggs');
  SUGGS.forEach(function(s) {
    var b = document.createElement('button');
    b.className = 'chip'; b.textContent = s;
    b.onclick = (function(q) { return function() { send(q); }; })(s);
    c.appendChild(b);
  });
  addGreeting();
}

init();
</script>
